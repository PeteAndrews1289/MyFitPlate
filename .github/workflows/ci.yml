name: CI

# Builds the app, runs the app unit suite, and runs the Core package tests on every
# push / PR to main so logic regressions are caught before they reach an archive.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: brew install swiftlint

      # secrets.xcconfig is gitignored. The unit tests are pure logic and never call
      # OpenAI or FatSecret, so empty placeholders are enough for the app target to
      # compile. (Keep values free of "//" — xcconfig treats it as a comment.)
      - name: Provide placeholder build secrets
        run: |
          cat > secrets.xcconfig <<'EOF'
          FATSECRET_PROXY_URL =
          OPENAI_API_KEY =
          EOF

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MyFitPlate.xcodeproj \
            -scheme MyFitPlate

      - name: Run Core package tests
        run: swift test --enable-code-coverage --package-path MyFitPlateCore

      - name: Check Core coverage floor
        env:
          CORE_COVERAGE_MINIMUM: "7.0"
        run: ./scripts/check_core_coverage.sh

      - name: Run unit tests
        run: |
          gem install xcpretty
          set -o pipefail
          xcodebuild test \
            -project MyFitPlate.xcodeproj \
            -scheme MyFitPlate \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:MyFitPlateTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-D UI_TESTING" | xcpretty

      - name: Check coverage floor
        env:
          # Most logic now lives in the MyFitPlateCore package (run by `swift test` above), so the
          # app target is thin UI and reports ~1.2% line coverage. This floor only guards the app
          # target against regressing to zero. TODO(#3): add a real coverage gate on MyFitPlateCore.
          COVERAGE_MINIMUM: "1.0"
        run: python3 scripts/check_xcode_coverage.py TestResults.xcresult --target MyFitPlate.app

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  firebase-rules:
    name: Firebase rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/firebase-rules/package-lock.json

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install rule-test dependencies
        working-directory: tests/firebase-rules
        run: npm ci

      - name: Run Firestore rule tests
        run: |
          npx -y firebase-tools emulators:exec \
            --project myfitplate-test-project \
            --only firestore \
            "npm test --prefix tests/firebase-rules"
